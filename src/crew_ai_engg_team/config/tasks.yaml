requirements_task:
  description: >
    Convert the exact supplied specification below into a concise PRD.

    SOURCE REQUIREMENTS:
    {requirements}

    SCOPE RULES:
    - Do not invent authentication, passwords, persistence, market integrations,
      databases, user profiling, fees, or other capabilities not stated above.
    - Label each requirement FR-001, FR-002, and so on.
    - Include acceptance criteria that cite only those requirement identifiers.
    - Preserve the mandated module `{module_name}` and primary class `{class_name}`.
  expected_output: >
    A Markdown PRD with Scope, Functional Requirements, Technical Constraints,
    Explicitly Out of Scope, and Acceptance Criteria sections.
  agent: product_manager
  output_file: output/requirements.md

design_task:
  description: >
    Design `{module_name}.py` with `{class_name}` as its only primary class,
    using the PRD from context. Specify state, method signatures, validation rules,
    error behavior, and `get_share_price`. Map every public method to an FR number.
    Do not add features and do not write implementation code.
  expected_output: >
    A concise Markdown module design with requirement mappings and testable invariants.
  agent: engineering_lead
  context:
    - requirements_task
  output_file: output/design.md

backend_task:
  description: >
    Implement `{module_name}.py` containing `{class_name}` using only the PRD and
    design from context. Use the Python standard library only. Implement every
    required method fully, validate invalid operations, and implement deterministic
    `get_share_price(symbol: str) -> float` for the required symbols.

    Output one complete Python source file only: no Markdown fences, explanations,
    TODOs, placeholders, ellipses, or executable main block.
  expected_output: >
    Valid complete Python source code for `{module_name}.py`.
  agent: backend_engineer
  context:
    - design_task
  output_file: output/{module_name}.py

frontend_task:
  description: >
    Write `app.py`, a minimal optional Gradio demonstration that imports
    `{class_name}` from `{module_name}` and exposes the approved core actions.
    Keep all accounting logic in the backend. Do not launch the app at import time;
    an `if __name__ == "__main__":` launch guard is permitted.

    Output one complete Python source file only with no Markdown wrapping.
  expected_output: >
    Valid complete Python source code for a minimal Gradio app.
  agent: frontend_engineer
  context:
    - design_task
    - backend_task
  output_file: output/app.py

review_task:
  description: >
    Review the code files generated by the previous tasks.
    
    CRITICAL STRUCTURE REQUIREMENTS:
    Your final markdown report MUST strictly include the following three phrases as section headings. Do not modify, reword, or skip them:
    - ## Summary
    - ## Blocking Issues
    - ## Non-Blocking Issues

    CRITICAL DECISION REQUIREMENTS:
    You must explicitly state exactly one of these decision tokens in your text:
    - decision: REPAIR_REQUIRED
    - decision: NO_CHANGES_REQUIRED

    CRITICAL CONDITIONAL LAYOUTS:
    1. If your decision is REPAIR_REQUIRED, you MUST include a list under '## Blocking Issues' containing these exact lowercase keyword labels:
       - **severity**: [High/Medium/Low]
       - **artifact**: [File path/Name]
       - **repair**: [Instructions on how to fix it]

    2. If your decision is NO_CHANGES_REQUIRED, you MUST explicitly include this exact phrase anywhere in your report:
       "static review found no defects"

    Make sure every single required keyword and section header listed above is present in your output text.
  expected_output: >
    A formal markdown code review report containing the exact section headers (Summary, Blocking Issues, Non-Blocking Issues) and matching decision validation tokens.
  agent: reviewer
  context:
    - requirements_task
    - design_task
    - backend_task
    - frontend_task
  output_file: output/review.md

backend_repair_task:
  description: >
    Fix the review comments from reviewer feedback and do backend implementation.
    Preserve architecture unless correction is required.
    Output one corrected complete Python source file only.
  expected_output: >
    Corrected backend implementation.
  agent: fix_review_engineer
  context:
    - design_task
    - review_task
    - backend_task

  output_file: output/{module_name}.py

frontend_repair_task:
  description: >
    Repair frontend implementation using review feedback.
    Output one corrected frontend implementation only.
  expected_output: >
    Corrected frontend implementation.
  agent: frontend_engineer
  context:
    - design_task
    - frontend_task
    - review_task

test_task:
  description: >
    Write deterministic unittest tests for the repaired backend module.
    Cover:
    - account creation
    - deposits
    - withdrawals
    - buy/sell operations
    - holdings
    - valuation
    - unsupported symbols
    - transaction logs
    - edge cases
    Import:
    from {module_name} import {class_name}
    Output one complete unittest source file only.
  expected_output: >
    Complete unittest implementation.
  agent: test_engineer
  context:
    - design_task
    - backend_repair_task
  output_file: output/test_{module_name}.py

test_execution_task:
  description: >
    Execute the generated unittest suite against the repaired backend module.
    Capture:
    - failing tests
    - tracebacks
    - assertion failures
    - missing methods
    - runtime exceptions
    Output raw execution results only.
  expected_output: >
    Raw unittest execution report.
  agent: test_engineer
  context:
    - test_task
  output_file: output/test_failures.txt

test_fix_task:
  description: >
    Analyze unittest execution failures and repair the backend
    implementation so tests pass.
    Fix:
    - missing methods
    - incorrect return values
    - validation mismatches
    - state handling bugs
    - API contract issues
    Preserve architecture unless required.
    Output one corrected Python source file only.
  expected_output: >
    Corrected backend implementation.
  agent: backend_engineer
  context:
    - test_task
    - test_execution_task
  output_file: output/{module_name}.py

test_execution_task_rerun:
  description: >
    Execute the generated unittest suite against the repaired backend module.
    Capture:
    - failing tests
    - tracebacks
    - assertion failures
    - missing methods
    - runtime exceptions
    Output raw execution results only.
  expected_output: >
    Raw unittest execution report.
  agent: test_engineer
  context:
    - test_fix_task
  output_file: output/test_failures.txt


