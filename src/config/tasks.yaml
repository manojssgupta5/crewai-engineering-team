requirements_task:
  description: >
    Convert the exact supplied specification below into a concise PRD.

    SOURCE REQUIREMENTS:
    {requirements}

    SCOPE RULES:
    - Do not invent authentication, passwords, persistence, market integrations,
      databases, user profiling, fees, or other capabilities not stated above.
    - Label each requirement FR-001, FR-002, and so on.
    - Include acceptance criteria that cite only those requirement identifiers.
    - Preserve the mandated module `{module_name}` and primary class `{class_name}`.
  expected_output: >
    A Markdown PRD with Scope, Functional Requirements, Technical Constraints,
    Explicitly Out of Scope, and Acceptance Criteria sections.
  agent: product_manager
  output_file: output/requirements.md

design_task:
  description: >
    Produce an implementation-oriented design specification from requirements_task output.

    ABSOLUTE RULE: Do NOT write any Python code or code blocks anywhere in this document.
    Express all contracts, signatures, and state as structured prose and tables only.
    The backend engineer writes the code. Your job is to specify what to build.

    Follow these phases strictly.

    Phase 1: Requirement Extraction
    Parse every functional requirement, technical constraint, and acceptance criterion.
    Extract all explicit system behaviors. Do not merge or summarize distinct requirements.

    Phase 2: Obligation Synthesis
    For each requirement, produce a table row covering:
    - Required public method name and purpose
    - Internal state it reads or mutates
    - Calculations required
    - Validations that must be enforced BEFORE any mutation
    - Exceptions/errors raised on validation failure (use custom exception names,
      never shadow Python built-ins such as ValueError — use InvalidAmountError,
      InvalidSymbolError, etc.)
    - Reporting outputs

    Implied obligations must be made explicit:
    - Transaction history requires a stored list of transaction records
    - Portfolio value requires per-symbol valuation logic
    - Profit/loss requires tracking total deposited funds as a running total

    Phase 3: API Contract Table
    Produce ONE table per class with these columns:
    Method | Parameters | Returns | Raises | Pre-conditions | Post-conditions | Side-effects

    Rules for this table:
    - Express signatures as: method_name(param: type, ...) -> return_type
    - List every custom exception that can be raised and the exact condition
    - Pre-conditions are checked BEFORE mutation; post-conditions are the guaranteed
      state AFTER a successful call
    - No code. No Python syntax. Use plain English and type names only.

    Phase 4: State Model
    Define each class with:
    - Name and purpose
    - Every instance variable: name, type, initial value, invariant
    - Relationships between classes

    Phase 5: Architecture and Data Flow
    Describe in prose:
    - How each operation flows from entry point to state mutation
    - Where validation occurs relative to mutation
    - How transaction records are created and stored
    - How portfolio value and profit/loss are calculated at report time

    Phase 6: Traceability Matrix
    Table mapping: Requirement ID | Obligation | Responsible method | Expected test scenarios

    Every acceptance criterion must appear in this table.

    Phase 7: Testing Obligations
    List concrete test scenarios covering:
    - Happy paths for every public method
    - Every validation failure path (negative amount, insufficient funds/shares,
      invalid symbol, unknown account)
    - State transition correctness (buy then sell, deposit then withdraw)
    - Reporting accuracy (portfolio value, profit/loss calculation)
    - Edge cases (sell all shares removes symbol from holdings, zero-holding state)

    Critical Rules:
    - NEVER write Python code or fenced code blocks.
    - NEVER mark any FR-006 sub-requirement as out of scope.
      Transaction history storage IS required.
    - Do not collapse distinct reporting requirements into a single bullet.
    - Ensure every downstream agent can implement without re-reading the PRD.

    CRITICAL SIGNATURE RULES:
    - Every method in the API Contract Table MUST specify exact Python types
      for every parameter (str, float, int — never "user data", "dict", or vague types).
    - create_account MUST accept a plain str name, never a dict or object.
    - Ambiguous signatures will cause backend/test contract mismatches and will be rejected.
    - Both backend_task and test_task will implement directly from this document
      without re-reading the PRD — so every contract must be self-contained and exact.

  expected_output: >
    A traceable implementation-oriented technical design specification in Markdown.
    Contains NO Python code. All contracts expressed as structured tables and prose.
  agent: engineering_lead
  output_file: output/design.md

backend_task:
  description: >
    Implement `{module_name}.py` containing `{class_name}` using only the PRD and
    design from context. Use the Python standard library only. Implement every
    required method fully, validate invalid operations, and implement deterministic
    `get_share_price(symbol: str) -> float` for the required symbols.

    MANDATORY NAMING RULES — a guardrail will hard-reject the file if either is violated:
    1. The file MUST define `class {class_name}:` at the TOP LEVEL using EXACTLY
       this PascalCase name. No aliases, no lowercase variants, no renaming.
    2. Every public method documented in the design MUST appear inside that class.

    Output one complete Python source file only: no Markdown fences, explanations,
    TODOs, placeholders, ellipses, or executable main block.
  expected_output: >
    Valid complete Python source code for `{module_name}.py`.
  agent: backend_engineer
  output_file: output/{module_name}.py

frontend_task:
  description: >
    Write `app.py`, a minimal Gradio UI that wraps the already-implemented backend.

    ABSOLUTE RULES — a guardrail will hard-reject violations:
    1. Your FIRST line of logic must be:
       from {module_name} import {class_name}
    2. Do NOT define ANY of the following — they already exist in {module_name}.py
       and must be imported, never redefined:
       - Any exception class (InvalidNameError, InvalidAmountError,
         InsufficientFundsError, InvalidSymbolError, InsufficientSharesError,
         or any other *Error class)
       - TransactionRecord or any other data class
       - AccountManager or any manager/service class
       - get_share_price or any pricing function
       - Any method that performs business logic
    3. Do NOT copy or reimplement ANY logic from {module_name}.py.
       If you find yourself writing validation, calculation, or state mutation —
       STOP. That belongs in the backend. Delegate to {class_name} instead.
    4. Do NOT launch the app at import time.
       Use: if __name__ == '__main__': demo.launch()

    ONLY allowed in app.py:
    - The import line: from {module_name} import {class_name}
    - One global {class_name} instance
    - Thin wrapper functions that call {class_name} methods and catch exceptions
    - Gradio UI component definitions
    - The __main__ guard

    What to build:
    - Expose tabs or sections for: create account, deposit, withdraw,
      buy shares, sell shares, get report.
    - All inputs and outputs via Gradio components only.
    - Catch and display exceptions from the backend as plain error strings.
    - Use a Dropdown with choices [AAPL, TSLA, GOOGL] for symbol inputs.

    Output one complete Python source file only. No Markdown fences or explanations.
  expected_output: >
    Valid complete Python source code for a Gradio app that imports and delegates
    entirely to {module_name}.{class_name}. Contains no reimplemented backend logic.
  agent: frontend_engineer
  output_file: output/app.py

test_task:
  description: >
    Write deterministic unittest tests for the backend module ONLY.

    ABSOLUTE IMPORT RULES — violations will cause test collection to fail:
    1. Only allowed imports are:
       - import unittest
       - from {module_name} import {class_name}
       - Standard library modules only (datetime, decimal, etc.)
    2. Do NOT import gradio, requests, flask, or ANY third-party package.
    3. Do NOT import app, app.py, or any frontend module.
    4. Do NOT import anything that requires a network, UI, or external service.
    5. The test file must run successfully with:
       python -m unittest test_{module_name} --network none

    WHAT TO TEST — only the backend {class_name} public API:
    - account creation (valid name, empty name)
    - deposits (valid amount, zero, negative)
    - withdrawals (sufficient funds, insufficient funds)
    - buy/sell operations (valid, insufficient funds, insufficient shares)
    - holdings state after buy and sell
    - valuation and profit/loss in get_report
    - unsupported symbols
    - transaction log entries
    - edge cases (sell all shares removes symbol, zero balance state)

    Import: from {module_name} import {class_name}
    Output one complete unittest source file only. No Markdown fences.
  expected_output: >
    Complete unit test implementation using only unittest and {module_name}.
  agent: test_engineer
  output_file: output/test_{module_name}.py

test_execution_task:
  description: >
    Call the `verify_final_artifacts` tool with confirmation='run' to execute
    the generated unittest suite inside the isolated Docker sandbox.
    Your output MUST be the EXACT unmodified text returned by the tool.
    Do NOT summarize, paraphrase, or add any commentary.
    Capture every line including:
    - PASSED/FAILED status prefix
    - failing tests
    - tracebacks
    - assertion failures
    - missing methods
    - runtime exceptions
  expected_output: >
    The exact raw string returned by the verify_final_artifacts tool, starting
    with either 'PASSED:' or 'FAILED:', followed by the full test output.
  agent: test_engineer
  output_file: output/test_failures.txt

test_fix_task:
  description: >
    Analyze unittest execution failures and repair the backend
    implementation so tests pass.
    Fix:
    - missing methods
    - incorrect return values
    - validation mismatches
    - state handling bugs
    - API contract issues
    Preserve architecture unless required.
    Output one corrected Python source file only.
  expected_output: >
    Corrected backend implementation.
  agent: backend_engineer
  output_file: output/{module_name}.py

